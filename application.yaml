eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_SERVER_ADDRESS:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: gateway
  tracing:
    sampling:
      probability: 1.0 # 100% of traces. In prod, use 0.1 (10%)

# In Spring Boot 3, Zipkin is usually configured under management.tracing
# If using the specialized Zipkin Brave/OTEL starter:
management:
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# --- Propagation - OpenTelemetry uses "W3C" (traceparent) by default.
# Note: In Spring Boot 3, propagation is usually set via:
